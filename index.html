<!DOCTYPE html>
<html>
  <head>
    <title>设备信息</title>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
      function showDeviceInfo() {
        // 获取用户代理信息
        const userAgent = navigator.userAgent;

        // 获取浏览器名称和版本
        const browserName = navigator.appName;
        const browserVersion = navigator.appVersion;

        // 获取操作系统名称和版本
        const osName = navigator.platform;
        const osVersion = navigator.oscpu;

        // 检测是否是移动设备
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // 显示设备信息
        document.getElementById("userAgent").textContent = `用户代理: ${userAgent}`;
        document.getElementById("browserName").textContent = `浏览器名称: ${browserName}`;
        document.getElementById("browserVersion").textContent = `浏览器版本: ${browserVersion}`;
        document.getElementById("osName").textContent = `操作系统名称: ${osName}`;
        document.getElementById("osVersion").textContent = `操作系统版本: ${osVersion}`;
        document.getElementById("isMobile").textContent = `是否移动设备: ${isMobile ? '是' : '否'}`;
      }
    </script>
  </head>
  <body onload="showDeviceInfo()">
    <h1>设备信息</h1>
    <p id="userAgent"></p>
    <p id="browserName"></p>
    <p id="browserVersion"></p>
    <p id="osName"></p>
    <p id="osVersion"></p>
    <p id="isMobile"></p>
  </body>
</html>
